<title>Service NSW</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #e8eaed;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px 0;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #fff;
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    position: relative;
  }
  .screen {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
  }
  .home-screen {
    width: 100%;
    height: 100%;
    position: relative;
  }
  .home-img {
    width: 100%;
    display: block;
  }
  .licence-tap-zone {
    position: absolute;
    top: 198px;
    left: 100px;
    width: 260px;
    height: 200px;
    cursor: pointer;
    z-index: 10;
    border-radius: 16px;
  }
  .licence-tap-zone:hover {
    background: rgba(255,255,255,0.08);
  }
  .licence-modal {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    z-index: 20;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .licence-modal.open {
    transform: translateY(0);
  }
  .lic-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .lic-scroll::-webkit-scrollbar { display: none; }
  .lic-scroll img {
    width: 100%;
    display: block;
  }
</style>
</head>

  </div>
</div>
<script>
  function openLicence() {
    document.getElementById('licenceModal').classList.add('open');
  }
  document.getElementById('licenceModal').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    if (x < 70 && y < 70) {
      this.classList.remove('open');
    }
  });
</script>
</body>
</html>
